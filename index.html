<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crônicas de Aethelgard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Metamorphous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container" class="wood-board">
        
        <div id="class-selection-screen">
            <h1>🗡️ Aethelgard</h1>
            <p style="text-align: center; color: #f5f5dc;">Escolhe a tua Classe:</p>
            <div class="class-grid">
                <button class="class-card parchment" onclick="window.game.chooseClass('cavaleiro')">
                    <h2>🛡️ Cavaleiro</h2>
                    <p>Foco em Defesa e Vida.</p>
                </button>
                <button class="class-card parchment" onclick="window.game.chooseClass('mago')">
                    <h2>🧙‍♂️ Mago</h2>
                    <p>Dano Mágico e muita Mana.</p>
                </button>
                <button class="class-card parchment" onclick="window.game.chooseClass('arqueiro')">
                    <h2>🏹 Arqueiro</h2>
                    <p>Ataque rápido e Críticos.</p>
                </button>
                <button class="class-card parchment" onclick="window.game.chooseClass('anao')">
                    <h2>🪓 Anão</h2>
                    <p>O mestre da sobrevivência.</p>
                </button>
            </div>
        </div>

        <div id="main-game-screen" class="hidden">
            <div id="log-window" class="dark-parchment">
                <ul id="game-log"></ul>
            </div>

            <header id="hero-status" class="parchment">
                <div class="status-box">
                    <h2><span id="hero-icon">🛡️</span> <span id="hero-class-name">Herói</span> <small>Nvl <span id="lvl">1</span></small></h2>
                    <div class="bars">
                        <div class="stat-row">❤️ <div class="bar-container"><div id="hp-bar" class="bar hp"></div><span class="bar-text"><span id="hp">100</span>/<span id="max-hp">100</span></span></div></div>
                        <div class="stat-row">🔵 <div class="bar-container"><div id="mp-bar" class="bar mp"></div><span class="bar-text"><span id="mp">50</span>/<span id="max-mp">50</span></span></div></div>
                        <div class="stat-row" style="margin-top:5px; font-size: 0.8em; color: #4e342e;">
                            ⚔️ <span id="atk-val">0</span> | 🛡️ <span id="def-val">0</span>
                        </div>
                        <div class="bar-container xp-container"><div id="xp-bar" class="bar xp"></div></div>
                    </div>
                </div>
                <div class="inventory-btn" onclick="window.ui.openInventory()">
                    <h3>🎒 Bolsa</h3>
                    <p>💰 <b id="gold">0</b> | 🧪 <b id="potions">3</b></p>
                </div>
            </header>

            <main style="flex-grow: 1;">
                <div id="battle-arena" class="hidden stone-bg">
                    <div class="vs-container">
                        <div class="combatant" id="player-portrait"><div class="portrait-frame gold-frame">🤺</div><span>Tu</span></div>
                        <div class="vs-text">VS</div>
                        <div class="combatant" id="enemy-portrait"><div class="portrait-frame iron-frame" id="enemy-art-icon">👺</div><span id="enemy-name-display">...</span></div>
                    </div>
                    <div class="bar-container" style="width:80%; margin: 0 auto;"><div id="enemy-hp-bar" class="bar enemy-hp"></div></div>
                </div>
            </main>

            <div id="controls">
                <div id="exploration-actions">
                    <button class="btn-medieval" onclick="window.game.explore()">🌲 Explorar</button>
                    <button class="btn-medieval" onclick="window.game.rest()">🛌 Pousada (10💰)</button>
                    <button class="btn-medieval purchase" onclick="window.player.buyPotion()">🛒 Comprar Poção (20💰)</button>
                </div>
                <div id="combat-actions" class="hidden">
                    <button class="btn-medieval attack" onclick="window.combat.attack()">⚔️ Atacar</button>
                    <button class="btn-medieval skill" onclick="window.combat.useSkill()">✨ <span id="skill-name">Poder</span></button>
                    <button class="btn-medieval heal" onclick="window.player.usePotion()">🧪 Poção</button>
                    <button class="btn-medieval flee" onclick="window.combat.flee()">🏃 Fugir</button>
                </div>
                <div id="system-menu">
                    <button class="btn-sys" onclick="window.game.saveGame()">💾 Salvar</button>
                    <button class="btn-sys reset" onclick="window.game.resetGame()">🔄 Reset</button>
                </div>
            </div>
        </div>
    </div>

    <div id="inventory-modal" class="modal-overlay hidden">
        <div class="parchment inventory-panel">
            <h2>🎒 Inventário</h2>
            <div class="inv-category">
                <h3>🤺 Equipado</h3>
                <ul id="inv-equipped"></ul>
            </div>
            <div class="inv-category">
                <h3>📦 Mochila</h3>
                <ul id="inv-bag"></ul>
            </div>
            <button class="btn-medieval" style="width:100%" onclick="window.ui.closeInventory()">Fechar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
