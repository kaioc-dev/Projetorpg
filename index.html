<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crônicas de Aethelgard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Metamorphous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="game-container" class="wood-board">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>

        <div class="game-header-ornament">
            <h1>🗡️ Aethelgard</h1>
        </div>

        <header id="hero-status" class="parchment">
            <div class="status-box">
                <h2>🛡️ Herói Nível <span id="lvl">1</span></h2>
                
                <div class="bars">
                    <div class="stat-row">
                        <span>❤️ Vida:</span>
                        <div class="bar-container hp-container">
                            <div id="hp-bar" class="bar hp"></div>
                            <span class="bar-text"><span id="hp">100</span>/<span id="max-hp">100</span></span>
                        </div>
                    </div>
                    <div class="stat-row">
                        <span>🌟 EXP:</span>
                        <div class="bar-container xp-container">
                            <div id="xp-bar" class="bar xp"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="inventory">
                <h3>🎒 Bolsa</h3>
                <p>💰 Ouro: <b id="gold">0</b></p>
                <p>🧪 Poções: <b id="potions">3</b></p>
            </div>
        </header>

        <main>
            <div id="battle-arena" class="hidden stone-bg">
                <div class="vs-container">
                    <div class="combatant" id="player-portrait">
                        <div class="portrait-frame gold-frame">
                            <div class="portrait hero-art">🤺</div>
                        </div>
                        <span class="label">Você</span>
                    </div>
                    
                    <div class="vs-text">⚔️</div>
                    
                    <div class="combatant" id="enemy-portrait">
                        <div class="portrait-frame iron-frame">
                            <div class="portrait enemy-art" id="enemy-art-icon">👺</div>
                        </div>
                        <span class="label enemy-label" id="enemy-name-display">Monstro</span>
                    </div>
                </div>

                <div id="enemy-hud">
                    <div class="bar-container enemy-hp-container">
                        <div id="enemy-hp-bar" class="bar enemy-hp"></div>
                    </div>
                </div>
            </div>

            <div id="log-window" class="dark-parchment">
                <h3>📜 Diário de Aventuras</h3>
                <ul id="game-log">
                    <li>Sua lenda começa... O que deseja fazer?</li>
                </ul>
            </div>
        </main>

        <div id="controls">
            <div id="exploration-actions">
                <button class="btn-medieval" onclick="game.explore()">🌲 Explorar</button>
                <button class="btn-medieval" onclick="game.rest()">🛌 Pousada (10💰)</button>
                <button class="btn-medieval purchase" onclick="player.buyPotion()">🛒 Comprar Poção (20💰)</button>
            </div>
            <div id="combat-actions" class="hidden">
                <button class="btn-medieval attack" onclick="combat.attack()">⚔️ Atacar!</button>
                <button class="btn-medieval heal" onclick="player.usePotion()">🧪 Poção</button>
                <button class="btn-medieval flee" onclick="combat.flee()">🏃 Fugir</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
